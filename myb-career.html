<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MYB 진로 탐색 — Meet Your Beauty Mentoring</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-dark:#085041;--green-light:#E1F5EE;--green-mid:#9FE1CB;
  --purple:#6B3FAB;--purple-light:#F3EEFF;--purple-border:#C9B3F5;
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#888;
  --bg:#FAFAF8;--surface:#fff;--border:#e8e5df;--radius:12px;
}
body{background:var(--bg);font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
#wrap{width:100%;max-width:440px;}
.prog{display:flex;gap:5px;margin-bottom:1.25rem;}
.prog-dot{height:3px;flex:1;border-radius:2px;background:var(--border);}
.prog-dot.on{background:var(--green);}
.prog-dot.half{background:var(--green);opacity:.4;}
.sc-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.4;}
.sc-sub{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1.25rem;}
.tip{background:var(--green-light);border-left:2.5px solid var(--green);border-radius:0 8px 8px 0;padding:.65rem .9rem;font-size:12px;color:var(--green-dark);line-height:1.6;margin-bottom:1rem;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1.25rem;}
.card{border:0.5px solid var(--border);border-radius:var(--radius);padding:.85rem .7rem;cursor:pointer;background:var(--surface);text-align:center;transition:border-color .12s,background .12s;}
.card:hover{background:#f5f5f2;}
.card.sel{border-width:2px;}
.c-ico{font-size:20px;display:block;margin-bottom:5px;}
.c-lbl{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.c-eg{font-size:11px;color:var(--text3);line-height:1.5;}
.btn-main{width:100%;padding:14px;border-radius:var(--radius);border:none;font-size:14px;font-weight:700;cursor:pointer;color:white;background:var(--green);transition:opacity .12s,transform .1s;}
.btn-main:disabled{opacity:.28;cursor:not-allowed;}
.btn-main:not(:disabled):hover{opacity:.9;}
.btn-main:not(:disabled):active{transform:scale(.98);}
.btn-sec{width:100%;padding:11px;border-radius:var(--radius);border:0.5px solid var(--border);background:#f5f5f2;font-size:13px;color:var(--text2);cursor:pointer;margin-top:.5rem;}
.btn-sec:hover{background:#eeeeea;}
.back{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:0;margin-bottom:1rem;display:flex;align-items:center;gap:4px;}
.back:hover{color:var(--text);}
.step-hint{font-size:11px;color:var(--green-dark);background:var(--green-light);padding:3px 9px;border-radius:100px;display:inline-block;margin-bottom:.75rem;font-weight:600;}
.path-row{border:0.5px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:8px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;background:var(--surface);}
.path-row:hover{background:#f5f5f2;}
.path-row.sel{border:2px solid var(--green);background:var(--green-light);}
.path-lbl{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;}
.path-desc{font-size:12px;color:var(--text2);line-height:1.5;}
/* ── Career cards v3 ── */
.ccard{border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.ccard:hover{border-color:#b0c8be;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.ccard.sel{border:2px solid var(--green);box-shadow:0 2px 12px rgba(29,158,117,.15);}
.cchead{padding:.9rem 1rem;display:flex;align-items:flex-start;gap:10px;}
.ccname{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.35;}
.tag{font-size:11px;padding:2px 8px;border-radius:100px;display:inline-block;margin:2px 2px 0 0;}
.badge-new{font-size:10px;background:#FFF3CD;color:#856404;padding:1px 6px;border-radius:100px;font-weight:700;vertical-align:middle;margin-left:4px;}
.badge-mentor{font-size:10px;background:var(--purple-light);color:var(--purple);padding:1px 7px;border-radius:100px;font-weight:700;vertical-align:middle;margin-left:4px;border:1px solid var(--purple-border);}
.cc-tagline{font-size:12px;color:var(--text2);line-height:1.5;margin-top:5px;font-style:italic;}
.cc-sel-mark{width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .15s;}
.cc-sel-mark.on{background:var(--green);color:white;}
.cc-sel-mark.off{border:1.5px solid #d0cdc7;}
.cc-toggle{padding:7px 1rem;border-top:0.5px solid #f0ede7;font-size:11px;color:#888;display:flex;align-items:center;gap:4px;background:#fafaf8;}
.ccbody{padding:.85rem 1rem;border-top:0.5px solid var(--border);}
.info-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:.65rem;}
.info-ico{font-size:12px;flex-shrink:0;margin-top:1px;}
.info-lbl{font-size:12px;font-weight:600;color:var(--text2);min-width:58px;flex-shrink:0;}
.info-txt{font-size:12px;color:var(--text);line-height:1.55;}
.mentor-link{display:flex;align-items:center;justify-content:space-between;background:#f5f5f2;border:0.5px solid var(--border);border-radius:8px;padding:.65rem .85rem;margin-top:.65rem;cursor:pointer;font-size:12px;color:var(--text2);text-decoration:none;}
.mentor-link:hover{border-color:#ccc;}
.mentor-box{background:var(--purple-light);border:1px solid var(--purple-border);border-radius:8px;padding:.75rem .9rem;margin-top:.65rem;}
.confirm-section{background:#f8f8f5;border:0.5px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:1rem;}
.conf-item{display:flex;align-items:flex-start;gap:10px;padding:.65rem 0;border-bottom:0.5px solid var(--border);}
.conf-item:last-child{border-bottom:none;}
.conf-num{background:var(--green);color:white;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.conf-lbl{font-size:12px;color:var(--text2);margin-bottom:3px;}
.conf-val{font-size:14px;font-weight:700;color:var(--text);}
.sentence-box{border:2px solid var(--green);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1rem;font-size:14px;line-height:2.1;text-align:center;background:var(--green-light);}
.hl{font-weight:700;padding:2px 10px;border-radius:100px;}
.final-card{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:.75rem;}
.srow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 1.25rem;border-bottom:0.5px solid var(--border);font-size:13px;}
.srow:last-child{border-bottom:none;}
.skey{color:var(--text2);}
.sval{font-weight:600;color:var(--text);text-align:right;max-width:62%;}
.intro-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:.65rem;}
.intro-ico{width:28px;height:28px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.myb-cta{display:flex;align-items:center;background:var(--green);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.75rem;text-decoration:none;color:white;gap:12px;transition:opacity .12s;}
.myb-cta:hover{opacity:.9;}
.myb-cta-ico{font-size:28px;flex-shrink:0;}
.myb-cta-txt{flex:1;}
.myb-cta-title{font-size:15px;font-weight:700;margin-bottom:3px;}
.myb-cta-sub{font-size:11px;opacity:.85;line-height:1.4;}
</style>
</head>
<body>
<div id="wrap"><div id="myb"></div></div>

};

const CM_DEFAULT=(d,v)=>[{n:`${(D.find(x=>x.id===d)||{lbl:''}).lbl} × ${(V.find(x=>x.id===v)||{lbl:''}).lbl} 관련 직업`,tagline:'곧 업데이트될 예정이에요',tags:['준비 중'],isNew:false,isMentor:false,desc:'이 조합의 진로 정보는 곧 업데이트될 예정이에요.',do:'다양한 활동과 경험을 통해 탐구해보세요.',fit:'이 조합에 관심 있는 모든 사람',figure:'멘토 탐색 중'}];
const MYB_MENTOR_BASE_URL='https://myb-mentoring.kr/mentors';
const MYB_HOME_URL='https://myb-mentoring.kr';

let s={step:0,verb:null,domain:null,path:null,career:null,expanded:null};
const gv=id=>V.find(x=>x.id===id);
const gd=id=>D.find(x=>x.id===id);
const gp=id=>P.find(x=>x.id===id);
const getCareers=(d,v)=>(CM[d]||{})[v]||CM_DEFAULT(d,v);
const app=document.getElementById('myb');

function prog(step){
  return `<div class="prog">${[0,1,2,3,4].map(i=>`<div class="prog-dot ${i<step?'on':i===step?'half':''}"></div>`).join('')}</div>`;
}

function rIntro(){
  return `<div style="padding:.5rem 0;">
    <div style="text-align:center;margin-bottom:1.25rem;">
      <div style="font-size:44px;margin-bottom:.65rem;">🌱</div>
      <h1 style="font-size:22px;font-weight:800;color:#1a1a1a;margin-bottom:.5rem;">내 꿈의 방향 찾기</h1>
      <p style="font-size:13px;color:#5a5a5a;line-height:1.75;">진로는 꼭 하나의 직업이 아니어도 돼요.<br>내가 어떤 사람인지를 먼저 알아보는 시간이에요.</p>
    </div>
    <div style="background:#f8f8f5;border-radius:12px;border:0.5px solid #e8e5df;padding:1.1rem;margin-bottom:1.25rem;">
      <p style="font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:.85rem;">이렇게 진행돼요</p>
      ${[['🔨','행동 키워드 선택','내가 좋아하는 방식을 골라요'],['🌍','관심 분야 선택','흥미 있는 세계를 골라요'],['✅','나만의 문장 완성','두 선택을 합쳐봐요'],['🛤️','진로 경로 선택','내 스타일에 맞는 길을 골라요'],['✨','진로 후보 3가지 & 멘토 연결','나에게 맞는 직업과 멘토를 만나요']].map(([ico,t,d])=>`<div class="intro-step"><div class="intro-ico">${ico}</div><div><div style="font-size:13px;font-weight:600;color:#1a1a1a;">${t}</div><div style="font-size:11px;color:#888;">${d}</div></div></div>`).join('')}
      <div style="border-top:0.5px solid #e8e5df;margin-top:.65rem;padding-top:.75rem;font-size:11px;color:#888;">⏱ 약 3~5분 소요 &nbsp;·&nbsp; 언제든지 다시 해볼 수 있어요</div>
    </div>
    <button class="btn-main" onclick="go(1)">시작하기 →</button>
    <p style="font-size:11px;color:#aaa;text-align:center;margin-top:.75rem;">MYB 멘토링 · 오리진디자인 × 아모레퍼시픽 CSR</p>
  </div>`;
}

function rVerb(){
  return `${prog(0)}
    <span class="step-hint">1단계 · 행동 키워드 선택</span>
    <p class="sc-title">나는 이런 걸 할 때 신나요</p>
    <p class="sc-sub">아래 6가지 중에서 "이게 나야!" 싶은 걸 하나 골라주세요.<br>완벽하지 않아도 괜찮아요, 가장 가까운 걸 직관적으로 골라봐요.</p>
    <div class="tip">💡 고르기 어려울 땐 예시를 보고 골라봐요. 지금 잘 못해도 관심 있으면 OK!</div>
    <div class="grid2">${V.map(v=>`<div class="card${s.verb===v.id?' sel':''}" style="${s.verb===v.id?`border-color:${v.c};background:${v.bg};`:''}" onclick="sv('${v.id}')"><span class="c-ico">${v.e}</span><div class="c-lbl">${v.lbl}</div><div style="font-size:11px;font-weight:600;color:${s.verb===v.id?v.c:'#888'};margin-bottom:4px;">${v.tagline}</div><div class="c-eg">${v.ex}</div></div>`).join('')}</div>
    ${s.verb?`<div class="tip">"${gv(s.verb)?.lbl}" 선택됨 ✓<br>${gv(s.verb)?.desc}</div>`:''}
    <button class="btn-main" ${!s.verb?'disabled':''} onclick="go(2)">다음으로 →</button>`;
}

function rDomain(){
  const v=gv(s.verb);
  return `${prog(1)}
    <button class="back" onclick="go(1)">← 이전</button>
    <span class="step-hint">2단계 · 관심 분야 선택</span>
    <p class="sc-title">어떤 세계가 끌리나요?</p>
    <p class="sc-sub">아까 고른 <span style="font-weight:700;color:${v?.c};">"${v?.lbl}"</span>을 어떤 분야에서 하고 싶은지 골라보세요.</p>
    <div class="tip">💡 지금 잘 못해도 괜찮아요. 관심 있거나 해보고 싶은 세계를 골라요.</div>
    <div class="grid2">${D.map(d=>`<div class="card${s.domain===d.id?' sel':''}" style="${s.domain===d.id?`border-color:${d.c};background:${d.bg};`:''}" onclick="sd('${d.id}')"><span class="c-ico">${d.e}</span><div class="c-lbl">${d.lbl}</div><div style="font-size:11px;font-weight:600;color:${s.domain===d.id?d.c:'#888'};margin-bottom:4px;">${d.tagline}</div><div class="c-eg">${d.ex}</div></div>`).join('')}</div>
    ${s.domain?`<div class="tip">"${gd(s.domain)?.lbl}" 선택됨 ✓<br>${gd(s.domain)?.desc}</div>`:''}
    <button class="btn-main" ${!s.domain?'disabled':''} onclick="go(3)">다음으로 →</button>`;
}

function rConfirm(){
  const v=gv(s.verb),d=gd(s.domain);
  return `${prog(2)}
    <button class="back" onclick="go(2)">← 이전</button>
    <span class="step-hint">3단계 · 나만의 문장 완성</span>
    <p class="sc-title">내 선택을 확인해봐요</p>
    <p class="sc-sub">두 가지를 골랐어요. 내용을 확인하고 맞으면 계속 진행해요.</p>
    <div class="confirm-section" style="margin-bottom:1rem;">
      <div class="conf-item"><div class="conf-num">1</div><div><div class="conf-lbl">행동 키워드 (내가 좋아하는 방식)</div><div class="conf-val">${v?.e} ${v?.lbl} — ${v?.tagline}</div><div style="font-size:11px;color:#888;margin-top:3px;">${v?.desc}</div></div></div>
      <div class="conf-item"><div class="conf-num">2</div><div><div class="conf-lbl">관심 분야 (내가 끌리는 세계)</div><div class="conf-val">${d?.e} ${d?.lbl} — ${d?.tagline}</div><div style="font-size:11px;color:#888;margin-top:3px;">${d?.desc}</div></div></div>
    </div>
    <p style="font-size:12px;color:#888;text-align:center;margin-bottom:.6rem;">두 선택을 합치면 이런 문장이 돼요</p>
    <div class="sentence-box">나는 <span class="hl" style="background:${v?.bg};color:${v?.c};">${v?.e} ${v?.lbl}</span> 것을 좋아하는<br><span class="hl" style="background:${d?.bg};color:${d?.c};">${d?.e} ${d?.lbl}</span> 쪽에 관심이 있어요</div>
    <p style="font-size:11px;color:#888;text-align:center;margin-bottom:1rem;">이 문장이 나를 완벽하게 설명하지 않아도 괜찮아요.<br>지금 이 순간의 나를 보여주는 힌트예요 🌱</p>
    <div style="display:flex;gap:8px;">
      <button class="btn-sec" style="flex:1;padding:12px;" onclick="go(2)">다시 고를게요</button>
      <button class="btn-main" style="flex:2;" onclick="go(4)">맞아요, 계속할게요 →</button>
    </div>`;
}

function rPath(){
  return `${prog(3)}
    <button class="back" onclick="go(3)">← 이전</button>
    <span class="step-hint">4단계 · 진로 경로 선택</span>
    <p class="sc-title">꿈을 향한 길, 어떻게 가고 싶어요?</p>
    <p class="sc-sub">진로로 가는 방법은 여러 가지예요. 가장 관심 있는 길을 골라보세요.<br>지금 확실하지 않아도 괜찮아요.</p>
    ${P.map(p=>`<div class="path-row${s.path===p.id?' sel':''}" onclick="sp('${p.id}')"><span style="font-size:20px;flex-shrink:0;">${p.e}</span><div><div class="path-lbl">${p.lbl}</div><div class="path-desc">${p.d}</div>${s.path===p.id?`<div style="font-size:11px;color:#0F6E56;margin-top:5px;font-weight:600;">다음 단계: ${p.next}</div>`:''}</div></div>`).join('')}
    <button class="btn-main" style="margin-top:.75rem;" ${!s.path?'disabled':''} onclick="go(5)">진로 후보 보기 →</button>`;
}

function rCareers(){
  const v=gv(s.verb),d=gd(s.domain);
  const careers=getCareers(s.domain,s.verb);
  return `${prog(4)}
    <button class="back" onclick="go(4)">← 이전</button>
    <span class="step-hint">5단계 · 진로 추천</span>
    <p class="sc-title">나에게 맞는 진로 유형은?</p>
    <p class="sc-sub">${d?.e} <strong>${d?.lbl}</strong> × ${v?.e} <strong>${v?.lbl}</strong> 조합이에요.<br>3가지를 살펴보고 <strong>가장 나다운 것</strong>을 골라봐요.</p>
    ${careers.map((c,i)=>{
      const isSel=s.career===c.n;
      const isExp=s.expanded===i;
      return `<div class="ccard${isSel?' sel':''}" onclick="sc('${c.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',event)">
        <div class="cchead">
          <div style="flex:1;min-width:0;">
            <div class="ccname">${c.n}${c.isNew?`<span class="badge-new">NEW</span>`:''}${c.isMentor?`<span class="badge-mentor">🔮 MYB 멘토 예정</span>`:''}</div>
            <div style="margin-bottom:5px;">${c.tags.map(t=>`<span class="tag" style="background:${d?.bg};color:${d?.c};">${t}</span>`).join('')}</div>
            <div class="cc-tagline">"${c.tagline}"</div>
          </div>
          <div class="cc-sel-mark ${isSel?'on':'off'}">${isSel?'✓':''}</div>
        </div>
        <div class="cc-toggle" onclick="event.stopPropagation();toggle(${i});">
          <span style="font-size:11px;">${isExp?'▲ 접기':'▼ 자세히 보기'}</span>
        </div>
        ${isExp?`<div class="ccbody">
          <p style="font-size:13px;color:#1a1a1a;line-height:1.65;margin-bottom:.85rem;">${c.desc}</p>
          <div class="info-row"><span class="info-ico">🔧</span><span class="info-lbl">주요 업무</span><span class="info-txt">${c.do}</span></div>
          <div class="info-row"><span class="info-ico">💚</span><span class="info-lbl">이런 사람</span><span class="info-txt">${c.fit}</span></div>
          <div class="info-row"><span class="info-ico">🌟</span><span class="info-lbl">대표 인물</span><span class="info-txt">${c.figure}</span></div>
          ${c.isMentor
            ?`<div class="mentor-box"><div style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:4px;">🔮 MYB 멘토 예정이에요</div><div style="font-size:11px;color:#7B5AAB;line-height:1.55;">이 분야의 멘토가 곧 MYB 멘토링에 합류할 예정이에요!<br>기대해 주세요 — 지금 진로를 선택해두면 멘토가 추가될 때 바로 연결돼요.</div></div>`
            :`<a class="mentor-link" href="${MYB_MENTOR_BASE_URL}?career=${encodeURIComponent(c.n)}" target="_blank" onclick="event.stopPropagation()"><div><div style="font-weight:600;color:#1a1a1a;font-size:12px;">🧑‍💼 이 진로의 MYB 멘토 보기</div><div style="font-size:11px;margin-top:2px;color:#888;">Meet Your Beauty 멘토링 사이트에서 만나보세요</div></div><span style="color:#888;font-size:13px;">→</span></a>`
          }
        </div>`:''}
      </div>`;
    }).join('')}
    <div style="margin-top:1.25rem;background:#f8f8f5;border-radius:var(--radius);padding:1rem;border:0.5px solid var(--border);font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:.75rem;">
      💡 카드를 <strong>탭</strong>하면 선택돼요. <strong>▼ 자세히 보기</strong>를 누르면 더 많은 정보를 확인할 수 있어요.
    </div>
    <button class="btn-main" ${!s.career?'disabled':''} onclick="go(6)">내 진로 카드 완성하기 →</button>`;
}

function rFinal(){
  const v=gv(s.verb),d=gd(s.domain),p=gp(s.path);
  const careers=getCareers(s.domain,s.verb);
  const chosenCareer=careers.find(c=>c.n===s.career)||{isMentor:false};
  return `<div style="text-align:center;margin-bottom:1.25rem;">
    <div style="font-size:38px;margin-bottom:.5rem;">🎉</div>
    <p class="sc-title">진로 카드 완성!</p>
    <p style="font-size:12px;color:#888;">선생님, 부모님과 함께 이야기해보세요</p>
  </div>
  <div class="final-card">
    <div style="padding:1rem 1.25rem;background:${d?.bg};">
      <div style="font-size:11px;color:${d?.c};font-weight:600;margin-bottom:3px;">나의 진로 카드</div>
      <div style="font-size:16px;font-weight:700;color:#1a1a1a;">${d?.e} ${d?.lbl} × ${v?.e} ${v?.lbl}</div>
    </div>
    <div style="padding:.25rem 0;">
      <div class="srow"><span class="skey">관심 분야</span><span class="sval">${d?.e} ${d?.lbl}</span></div>
      <div class="srow"><span class="skey">좋아하는 방식</span><span class="sval">${v?.e} ${v?.lbl}</span></div>
      <div class="srow"><span class="skey">선택한 진로</span><span class="sval">${s.career}</span></div>
      <div class="srow"><span class="skey">진로 경로</span><span class="sval">${p?.e} ${p?.lbl}</span></div>
      <div class="srow"><span class="skey">다음 단계</span><span class="sval" style="font-size:11px;">${p?.next}</span></div>
    </div>
  </div>
  <div style="margin-bottom:1.25rem;">
    <p style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:.65rem;">🌟 나와 비슷한 길을 걷고 있는 멘토를 만나보세요</p>
    ${chosenCareer.isMentor
      ?`<div style="background:var(--purple-light);border:1.5px solid var(--purple-border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.65rem;">
          <div style="font-size:13px;font-weight:700;color:var(--purple);margin-bottom:5px;">🔮 <strong>${s.career}</strong> 분야 멘토 — 곧 만날 수 있어요!</div>
          <div style="font-size:12px;color:#7B5AAB;line-height:1.6;">이 진로의 MYB 멘토가 곧 합류할 예정이에요. 지금 MYB 사이트에서 다른 분야 멘토들을 먼저 만나보고, 알림을 신청해두세요!</div>
        </div>`
      :`<a class="mentor-link" href="${MYB_MENTOR_BASE_URL}?career=${encodeURIComponent(s.career)}&domain=${s.domain}&verb=${s.verb}" target="_blank" style="margin-bottom:.65rem;display:flex;">
          <div><div style="font-weight:600;color:#1a1a1a;font-size:12px;">🧑‍💼 <strong>${s.career}</strong> 진로의 MYB 멘토 보기</div><div style="font-size:11px;margin-top:2px;color:#888;">나와 비슷한 진로를 가진 멘토를 만나보세요</div></div>
          <span style="color:#888;font-size:14px;margin-left:auto;">→</span>
        </a>`
    }
    <a class="myb-cta" href="${MYB_HOME_URL}?domain=${s.domain}&verb=${s.verb}&career=${encodeURIComponent(s.career||'')}" target="_blank">
      <div class="myb-cta-ico">👋</div>
      <div class="myb-cta-txt">
        <div class="myb-cta-title">MYB에서 나의 진로 멘토를 만나보세요</div>
        <div class="myb-cta-sub">Meet Your Beauty 멘토링 사이트에서<br>나에게 딱 맞는 멘토를 직접 구경해요 →</div>
      </div>
    </a>
  </div>
  <button class="btn-main" onclick="restart()">처음부터 다시 해볼게요</button>
  <p style="font-size:11px;color:#aaa;text-align:center;margin-top:.75rem;">MYB 멘토링 · 오리진디자인 × 아모레퍼시픽 CSR</p>`;
}

function go(step){s.step=step;if(step===5)s.expanded=null;render();}
function sv(id){s.verb=id;render();}
function sd(id){s.domain=id;render();}
function sp(id){s.path=id;render();}
function sc(n,e){if(e)e.stopPropagation();s.career=(s.career===n?null:n);render();}
function toggle(i){s.expanded=s.expanded===i?null:i;render();}
function restart(){s={step:0,verb:null,domain:null,path:null,career:null,expanded:null};render();}
function render(){
  const screens=[rIntro,rVerb,rDomain,rConfirm,rPath,rCareers,rFinal];
  app.innerHTML=(screens[s.step]||rIntro)();
}
render();
</script>
</body>
</html>
